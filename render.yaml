services:
  - type: web
    name: cats-vs-dogs
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: IMAGE_INFERENCE_ENABLED
        value: "true"
      - key: IMAGE_MODEL_PERSISTENT
        value: "true"
      - key: IMAGE_MODEL_PRELOAD
        value: "true"
